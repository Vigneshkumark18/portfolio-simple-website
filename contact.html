<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400..900&family=Young+Serif&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="section-one">
            <h1 class="section-one__title">Vignesh Kumar</h1>
            <p class="section-one__role">Web Developer</p>
            <a class="section-one__contact" href="index.html">Home</a>
        </div>

        <form class="contact-form">
            <table>
                <tr>
                    <td><label>Name:</label></td>
                    <td><input type="text" placeholder="Enter Your Name" class="contact-form__input"></td>
                </tr>

                <tr>
                    <td><label>Email:</label></td>
                    <td><input type="email" placeholder="Enter the email" class="contact-form__input"></td>
                </tr>

                <tr>
                    <td><label>Message:</label></td>
                    <td><textarea name="message" id="message" class="contact-form__textarea">Message</textarea></td>
                </tr>

                <tr>
                    <td></td>
                    <td><input type="submit" class="contact-form__submit"></td>
                </tr>

            </table>
        </form>


        <div class="section-five">
            <p class="section-five__title">Social Media: <a href="https://www.instagram.com/">Instagram</a>.<a
                    href="https://in.linkedin.com/">LinkedIn</a>
            </p>
            <p class="section-five__desc">&copy;Vignesh Kumar</p>
        </div>


    </div>

</body>

</html>
